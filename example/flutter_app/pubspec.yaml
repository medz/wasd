name: wasd_flutter_example
description: "WASD Flutter DOOM example."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  isolate_manager: ^6.2.0
  wasd:
    path: ../../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isolate_manager_generator: ^0.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/doom/doom.wasm
    - assets/doom/doom1.wad
